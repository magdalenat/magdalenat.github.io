<!DOCTYPE html>
<html lang="pl" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wpadnij za chwilę...</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
  :root {
    --graphite-900: #1a1a18;
    --graphite-800: #232320;
    --graphite-700: #2e2e2a;
    --graphite-600: #3d3d38;
    --graphite-400: #6b6b62;
    --amber-400: #EF9F27;
    --amber-300: #FAC775;
    --amber-200: #FAEEDA;
    --node-col: rgba(239,159,39,0.55);
    --line-col: rgba(239,159,39,0.18);
    --line-col-dim: rgba(239,159,39,0.08);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }

  body {
    background-color: var(--graphite-900);
    color: var(--amber-300);
    font-family: 'DM Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* Siatka blueprint */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--graphite-600) 1px, transparent 1px),
      linear-gradient(90deg, var(--graphite-600) 1px, transparent 1px),
      linear-gradient(rgba(239,159,39,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(239,159,39,0.06) 1px, transparent 1px);
    background-size: 20px 20px, 20px 20px, 100px 100px, 100px 100px;
    opacity: 0.7;
    z-index: 0;
    pointer-events: none;
  }

  /* SVG diagram w tle */
  #bg-diagram {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    pointer-events: none;
    opacity: 0;
    animation: diagramFadeIn 2s ease 0.5s forwards;
  }

  @keyframes diagramFadeIn {
    to { opacity: 1; }
  }

  /* Animacja kreślenia linii */
  .diagram-line {
    stroke-dasharray: 400;
    stroke-dashoffset: 400;
    animation: drawLine 1.8s ease forwards;
  }
  .diagram-line:nth-child(1)  { animation-delay: 0.3s; }
  .diagram-line:nth-child(2)  { animation-delay: 0.5s; }
  .diagram-line:nth-child(3)  { animation-delay: 0.7s; }
  .diagram-line:nth-child(4)  { animation-delay: 0.9s; }
  .diagram-line:nth-child(5)  { animation-delay: 1.0s; }
  .diagram-line:nth-child(6)  { animation-delay: 1.1s; }
  .diagram-line:nth-child(7)  { animation-delay: 1.2s; }
  .diagram-line:nth-child(8)  { animation-delay: 1.3s; }
  .diagram-line:nth-child(9)  { animation-delay: 1.4s; }
  .diagram-line:nth-child(10) { animation-delay: 1.5s; }
  .diagram-line:nth-child(11) { animation-delay: 1.6s; }
  .diagram-line:nth-child(12) { animation-delay: 1.7s; }

  @keyframes drawLine {
    to { stroke-dashoffset: 0; }
  }

  .diagram-node {
    opacity: 0;
    animation: nodePop 0.4s ease forwards;
  }
  .diagram-node:nth-child(1)  { animation-delay: 1.0s; }
  .diagram-node:nth-child(2)  { animation-delay: 1.2s; }
  .diagram-node:nth-child(3)  { animation-delay: 1.4s; }
  .diagram-node:nth-child(4)  { animation-delay: 1.6s; }
  .diagram-node:nth-child(5)  { animation-delay: 1.8s; }
  .diagram-node:nth-child(6)  { animation-delay: 2.0s; }
  .diagram-node:nth-child(7)  { animation-delay: 2.1s; }
  .diagram-node:nth-child(8)  { animation-delay: 2.2s; }

  @keyframes nodePop {
    0%   { opacity: 0; transform: scale(0.3); }
    70%  { opacity: 1; transform: scale(1.2); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* Pulsujące węzły */
  .node-pulse {
    animation: pulse 3s ease-in-out infinite;
  }
  .node-pulse:nth-child(odd) { animation-delay: 1.5s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; r: 4; }
    50%       { opacity: 1;   r: 6; }
  }

  .wrapper {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 2rem;
    max-width: 700px;
    width: 100%;
  }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    font-weight: 300;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--amber-200);
    margin-bottom: 2.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    animation: fadeDown 1s ease both;
  }

  .eyebrow::before, .eyebrow::after {
    content: '';
    display: block;
    height: 1px;
    width: 60px;
    background: linear-gradient(90deg, transparent, var(--amber-300));
  }
  .eyebrow::after {
    background: linear-gradient(90deg, var(--amber-300), transparent);
  }

  .headline {
    font-family: 'Fraunces', serif;
    font-size: clamp(3rem, 9vw, 6.5rem);
    font-weight: 300;
    line-height: 1.05;
    color: var(--amber-300);
    margin: 0 0 0.25em;
    animation: fadeUp 1.1s ease 0.15s both;
    letter-spacing: -0.02em;
    /* Lekkie tło żeby tekst był czytelny na diagramie */
    text-shadow: 0 0 40px rgba(26,26,24,0.9), 0 0 80px rgba(26,26,24,0.7);
  }

  .headline em {
    font-style: italic;
    color: var(--amber-400);
    font-weight: 400;
  }

  .subline {
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.85rem, 2vw, 1rem);
    font-weight: 300;
    color: var(--amber-200);
    letter-spacing: 0.04em;
    margin-top: 2rem;
    animation: fadeUp 1.1s ease 0.3s both;
  }

  .subline .cursor {
    display: inline-block;
    width: 8px;
    height: 1em;
    background: var(--amber-400);
    vertical-align: text-bottom;
    margin-left: 3px;
    animation: blink 1.1s step-end infinite;
  }

  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin: 3.5rem auto;
    animation: fadeUp 1.1s ease 0.45s both;
  }

  .divider-line {
    height: 1px;
    width: 140px;
    background: linear-gradient(90deg, transparent, var(--amber-400), transparent);
    opacity: 0.75;
  }

  .divider-diamond {
    width: 8px;
    height: 8px;
    background: var(--amber-400);
    transform: rotate(45deg);
    opacity: 0.9;
  }

  .footer-note {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    font-weight: 300;
    color: var(--amber-200);
    letter-spacing: 0.1em;
    animation: fadeUp 1.1s ease 0.6s both;
  }

  /* Narożniki */
  .corner {
    position: fixed;
    width: 40px;
    height: 40px;
    z-index: 3;
    opacity: 0.5;
    animation: fadeIn 2s ease both;
  }
  .corner-tl { top: 20px; left: 20px; border-top: 1px solid var(--amber-400); border-left: 1px solid var(--amber-400); }
  .corner-tr { top: 20px; right: 20px; border-top: 1px solid var(--amber-400); border-right: 1px solid var(--amber-400); }
  .corner-bl { bottom: 20px; left: 20px; border-bottom: 1px solid var(--amber-400); border-left: 1px solid var(--amber-400); }
  .corner-br { bottom: 20px; right: 20px; border-bottom: 1px solid var(--amber-400); border-right: 1px solid var(--amber-400); }

  /* Etykiety diagramu */
  .diag-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    fill: rgba(239,159,39,0.5);
    letter-spacing: 0.05em;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 0.5; }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
</style>
</head>
<body>

<!-- Blueprint diagram SVG w tle -->
